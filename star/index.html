--><!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star~!</title>

  <style>
    :root {
      --text-color: #ffffff;
      --font-serif: "Georgia", "Times New Roman", "Source Han Serif CN", "Songti SC", "STZhongsong", serif;
      --text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #stage {
      position: fixed;
      inset: 0;
      pointer-events: none;
      perspective: 1000px;
    }

    .danmaku-item {
      position: absolute;
      opacity: 0;
      will-change: transform, opacity;
      transform: translate3d(0, 0, 0);
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      
      min-width: 260px;
      width: max-content;
      max-width: 650px;
    }

    .danmaku-item.entering {
      opacity: 1;
    }

    .danmaku-item.leaving {
      animation: fadeOutNormal 0.5s ease-in forwards;
    }

    .danmaku-item .name-row,
    .danmaku-item .content,
    .danmaku-item .line-area,
    .danmaku-item .price-tag {
      opacity: 0;
      will-change: transform, opacity;
    }

    .danmaku-item.entering .name-row {
      animation: slideInFromRight 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .danmaku-item.entering .content {
      animation: slideInFromLeft 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .danmaku-item.entering .line-area,
    .danmaku-item.entering .price-tag {
      animation: fadeInNormal 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .inner {
      position: relative;
      padding: 10px 45px;
      display: flex;
      flex-direction: column;
      min-width: inherit;
    }

    /* --- 名字行 --- */
    .name-row {
      display: flex;
      align-items: center;
      position: relative;
      font-family: var(--font-serif);
      font-weight: 400; 
      color: var(--text-color);
      text-shadow: var(--text-shadow);
      margin-bottom: 0px;
      min-height: 32px;
    }

    .danmaku-item.is-vip .name-row {
      justify-content: center;
    }
    .danmaku-item:not(.is-vip) .name-row {
      justify-content: center;
    }

    .nickname-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .prefix {
      position: absolute;
      right: 100%;
      margin-right: 4px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      transform: translateY(-1px);
      white-space: nowrap;
    }

    .nickname {
      font-size: 22px;
      white-space: nowrap;
    }

    /* 非VIP 名字两侧的 ✦ */
    .name-star {
      font-size: 14px;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 4px rgba(255,255,255,0.5);
      animation: starBlink 2s infinite ease-in-out;
    }
    .name-star-left {
      margin-right: 8px;
    }
    .name-star-right {
      margin-left: 8px;
    }

    /* --- 分割线区域 --- */
    .line-area {
      position: relative;
      width: 100%;
      height: 20px;
      display: flex;
      align-items: center;
    }

    .ornament-line {
      flex: 1;
      height: 2.2px;
      transform: scaleY(0.5);
      background: linear-gradient(90deg, 
        rgba(255, 255, 255, 0) 0%, 
        rgba(255, 255, 255, 1) 18%, 
        rgba(255, 255, 255, 1) 82%, 
        rgba(255, 255, 255, 0) 100%
      );
    }

    /* --- 星群系统 --- */
    .star {
      position: absolute;
      color: #fff;
      line-height: 1;
      user-select: none;
      text-shadow: 0 0 3px rgba(255,255,255,0.4);
      animation: starBlink 2s infinite ease-in-out;
    }

    .star-left-main { left: -3px; font-size: 9px; }
    .star-left-sub { left: -18px; top: -10px; font-size: 18px; }

    .star-right-main { right: -18px; font-size: 18px; }
    .star-right-sub { right: -3px; top: -10px; font-size: 9px; }

    /* VIP 标识 - 跟在名字后面，避免重叠 */
    .vip-text {
      margin-left: 8px;
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: 400;
      font-style: normal;
      color: #ffffff;
      text-shadow: var(--text-shadow);
      letter-spacing: 0.5px;
      flex-shrink: 0;
      align-self: center;
      transform: translateY(3px);
    }

    /* --- 内容行 --- */
    .content {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 400; 
      color: var(--text-color);
      text-shadow: var(--text-shadow);
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.8px;
      word-break: break-all;
    }

    /* --- 价格标签 --- */
    .price-tag {
      position: absolute;
      right: -8px;
      top: 45%;
      transform: translateX(100%) translateY(-50%);
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
      color: var(--text-color);
      text-shadow: var(--text-shadow);
      white-space: nowrap;
      line-height: 1;
    }
    .price-plus {
      font-family: "Cambria", "Palatino Linotype", "Book Antiqua", serif;
      font-size: 28px;
      font-weight: 900;
    }
    .price-amount {
      font-family: "Cambria", "Palatino Linotype", "Book Antiqua", serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    @keyframes slideInFromRight {
      0% { opacity: 0; transform: translate3d(30px, 0, 0); filter: blur(3px); }
      100% { opacity: 1; transform: translate3d(0, 0, 0); filter: blur(0); }
    }

    @keyframes slideInFromLeft {
      0% { opacity: 0; transform: translate3d(-30px, 0, 0); filter: blur(3px); }
      100% { opacity: 1; transform: translate3d(0, 0, 0); filter: blur(0); }
    }

    @keyframes fadeInNormal {
      0% { opacity: 0; filter: blur(3px); }
      100% { opacity: 1; filter: blur(0); }
    }

    @keyframes fadeOutNormal {
      0% { opacity: 1; filter: blur(0); }
      100% { opacity: 0; filter: blur(5px); }
    }

    @keyframes starBlink {
      0%, 100% { opacity: 0.9; transform: scale(1); }
      50% { opacity: 0.2; transform: scale(0.85); }
    }

    @media (max-width: 768px) {
      .danmaku-item { min-width: 200px; }
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <script src="./blcsdk.js"></script>
  <script>
    const stage = document.getElementById('stage');
    const MAX_ITEMS = 8;
    const itemMap = new Map();
    const itemQueue = [];

    function escapeHtml(str = '') {
      return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function getGuardName(privilegeType) {
      switch (Number(privilegeType)) {
        case blcsdk.GuardLevel.LV3: return '总督';
        case blcsdk.GuardLevel.LV2: return '提督';
        case blcsdk.GuardLevel.LV1: return '舰长';
        default: return '舰长';
      }
    }

    function getMsgContent(msg) {
      switch (msg.type) {
        case blcsdk.MsgType.MEMBER:
          return escapeHtml(`上船了 ${getGuardName(msg.privilegeType)}`);
        case blcsdk.MsgType.SUPER_CHAT:
          return escapeHtml(msg.content || '');
        case blcsdk.MsgType.GIFT:
          return escapeHtml(`投喂了 ${msg.giftName || '礼物'}`);
        case blcsdk.MsgType.TEXT:
        default:
          return msg.contentParts ? renderParts(msg.contentParts) : escapeHtml(msg.content);
      }
    }

    function getMsgPrice(msg) {
      switch (msg.type) {
        case blcsdk.MsgType.MEMBER:
        case blcsdk.MsgType.SUPER_CHAT:
          return msg.price || 0;
        case blcsdk.MsgType.GIFT:
          return msg.price || 0;
        default:
          return 0;
      }
    }

    function buildHtml(msg) {
      const isVip = Number(msg.privilegeType || 0) > 0;
      const nickname = escapeHtml(msg.authorName || 'User');
      const content = getMsgContent(msg);
      const price = getMsgPrice(msg);
      const priceHtml = price > 0 
        ? `<span class="price-tag"><span class="price-plus">+</span><span class="price-amount"> ¥${price}</span></span>` 
        : '';

      if (isVip) {
        return `
          <div class="inner">
            <div class="name-row">
              <div class="nickname-wrap">
                <span class="prefix">+</span>
                <div class="nickname">${nickname}</div>
              </div>
              <span class="vip-text">VIP</span>
            </div>
            <div class="line-area">
              <span class="star star-left-main">✦</span>
              <span class="star star-left-sub">✦</span>
              <div class="ornament-line"></div>
              <span class="star star-right-main">✦</span>
              <span class="star star-right-sub">✦</span>
            </div>
            <div class="content">${content}</div>
            ${priceHtml}
          </div>
        `;
      }

      /* 非VIP：名字两侧加 ✦ */
      return `
        <div class="inner">
          <div class="name-row">
            <span class="name-star name-star-left">✦</span>
            <div class="nickname">${nickname}</div>
            <span class="name-star name-star-right">✦</span>
          </div>
          <div class="line-area">
            <div class="ornament-line"></div>
          </div>
          <div class="content">${content}</div>
          ${priceHtml}
        </div>
      `;
    }

    function renderParts(parts) {
      return parts.map(p => p.type === blcsdk.ContentPartType.IMAGE 
        ? `<img style="height:1.1em;vertical-align:middle;margin:0 2px;" src="${p.url}">` 
        : escapeHtml(p.text)).join('');
    }

    /* --- 防重叠定位 --- */
    const PADDING = 30;          // 弹幕之间的最小间距
    const MARGIN  = 40;          // 距屏幕边缘的最小边距
    const PRICE_TAG_EXTRA = 120; // price-tag 向右溢出的预留空间
    const MAX_ATTEMPTS = 60;     // 最大尝试次数

    function getExistingRects() {
      const rects = [];
      for (const [, data] of itemMap) {
        const r = data.el.getBoundingClientRect();
        rects.push({
          x: r.left  - PADDING,
          y: r.top   - PADDING,
          w: r.width + PADDING * 2,
          h: r.height + PADDING * 2
        });
      }
      return rects;
    }

    function overlapArea(ax, ay, aw, ah, bx, by, bw, bh) {
      const ox = Math.max(0, Math.min(ax + aw, bx + bw) - Math.max(ax, bx));
      const oy = Math.max(0, Math.min(ay + ah, by + bh) - Math.max(ay, by));
      return ox * oy;
    }

    function findBestPosition(el, elW, elH) {
      // 如果元素含有 price-tag，右侧需要额外预留空间
      const hasPriceTag = !!el.querySelector('.price-tag');
      const rightExtra = hasPriceTag ? PRICE_TAG_EXTRA : 0;

      const existing = getExistingRects();
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      // 可放置的安全范围
      const minX = MARGIN;
      const minY = MARGIN;
      const maxX = Math.max(minX, vw - elW - MARGIN - rightExtra);
      const maxY = Math.max(minY, vh - elH - MARGIN);

      const clamp = (x, y) => ({
        x: Math.min(Math.max(x, minX), maxX),
        y: Math.min(Math.max(y, minY), maxY)
      });

      let bestX = minX, bestY = minY, bestScore = Infinity;

      for (let i = 0; i < MAX_ATTEMPTS; i++) {
        const cx = Math.random() * (maxX - minX) + minX;
        const cy = Math.random() * (maxY - minY) + minY;
        let score = 0;
        for (const r of existing) {
          score += overlapArea(cx, cy, elW, elH, r.x, r.y, r.w, r.h);
        }
        if (score === 0) return clamp(cx, cy);
        if (score < bestScore) {
          bestScore = score;
          bestX = cx;
          bestY = cy;
        }
      }

      // 如果随机找不到无重叠位置，尝试网格扫描
      const cols = 6, rows = 5;
      const stepX = (maxX - minX) / cols;
      const stepY = (maxY - minY) / rows;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cx = minX + c * stepX + Math.random() * stepX * 0.5;
          const cy = minY + r * stepY + Math.random() * stepY * 0.5;
          let score = 0;
          for (const rect of existing) {
            score += overlapArea(cx, cy, elW, elH, rect.x, rect.y, rect.w, rect.h);
          }
          if (score === 0) return clamp(cx, cy);
          if (score < bestScore) {
            bestScore = score;
            bestX = cx;
            bestY = cy;
          }
        }
      }

      return clamp(bestX, bestY);
    }

    function addItem(msg) {
      if (!msg.id || itemMap.has(msg.id)) {
        console.warn('[DEBUG] 忽略无效或重复消息 ID:', msg.id);
        return;
      }

      console.log('[DEBUG] 准备渲染消息 ID:', msg.id, '内容:', msg.content);
      const el = document.createElement('div');
      const isVip = Number(msg.privilegeType || 0) > 0;
      el.className = `danmaku-item ${isVip ? 'is-vip' : ''}`;
      el.innerHTML = buildHtml(msg);

      // 先隐藏放入DOM以测量尺寸
      el.style.visibility = 'hidden';
      stage.appendChild(el);
      const elW = el.offsetWidth;
      const elH = el.offsetHeight;

      const pos = findBestPosition(el, elW, elH);
      el.style.left = `${pos.x}px`;
      el.style.top  = `${pos.y}px`;
      el.style.visibility = '';

      requestAnimationFrame(() => el.classList.add('entering'));

      const data = { id: msg.id, el, timer: setTimeout(() => removeItem(msg.id), 8000) };
      itemMap.set(msg.id, data);
      itemQueue.push(msg.id);
      if (itemQueue.length > MAX_ITEMS) removeItem(itemQueue.shift(), true);
    }

    function removeItem(id, fast = false) {
      const data = itemMap.get(id);
      if (!data) return;
      console.log(`[DEBUG] 移除页面消息 ID: ${id}, fast: ${fast}`);
      clearTimeout(data.timer);
      data.el.classList.add('leaving');
      // 等待 0.5s 动画播完再移除 DOM
      setTimeout(() => {
        if (data.el.parentNode) stage.removeChild(data.el);
        itemMap.delete(id);
      }, 500);
    }

    class Handler extends blcsdk.MsgHandler {
      addMsg(msg) { 
        console.log('[DEBUG] 收到了新消息 addMsg:', msg);
        addItem(msg); 
      }
      delMsgs(ids) { 
        console.log('[DEBUG] 要求删除消息 delMsgs:', ids);
        // 不处理外部移除消息请求，让其自然走完生命周期和渐出动画
        // ids.forEach(id => removeItem(id)); 
      }
    }

    blcsdk.init().then(() => {
      console.log('[DEBUG] BLC SDK 初始化成功');
      blcsdk.setMsgHandler(new Handler());
    }).catch(err => {
      console.error('[ERROR] BLC SDK 初始化失败:', err);
    });
  </script>
</body>
</html>
